<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoCopy | 緯度経度抽出ツール</title>
    <meta name="description" content="地図上の任意の地点の緯度と経度を簡単に抽出・コピーできるツールです。モバイル対応で外出先でも使いやすい。">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>GeoCopy</h1>
            <p>タップして座標を取得</p>
        </header>

        <div class="search-container">
            <input type="text" id="location-search" placeholder="場所を検索..." aria-label="場所を検索">
            <button id="search-btn" aria-label="検索">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>

        <div id="map"></div>

        <div class="results-container">
            <div class="result-card">
                <label for="lat-value">緯度 (Latitude)</label>
                <div class="input-group">
                    <input type="text" id="lat-value" readonly value="0.000000">
                    <button class="copy-btn" data-target="lat-value" aria-label="緯度をコピー">
                        コピー
                    </button>
                </div>
            </div>

            <div class="result-card">
                <label for="lng-value">経度 (Longitude)</label>
                <div class="input-group">
                    <input type="text" id="lng-value" readonly value="0.000000">
                    <button class="copy-btn" data-target="lng-value" aria-label="経度をコピー">
                        コピー
                    </button>
                </div>
            </div>
        </div>
        
        <div id="toast" class="toast">コピーしました！</div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .catch(() => { /* file:// protocol or no support */ });
        }
    </script>
</body>
</html>
